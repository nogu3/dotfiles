theme = "rose_pine_moon_transparent"

[editor.file-picker]
hidden = false
git-ignore = false

[keys.normal]
"A-up" = "copy_selection_on_prev_line"
"A-down" = "copy_selection_on_next_line"
esc = ["collapse_selection", "keep_primary_selection"]
D = ["extend_to_line_end", "delete_selection"]
"C-a" = "goto_line_start"
"C-e" = "goto_line_end"
"S-up" = "page_up"
"S-down" = "page_down"

[keys.select]
"A-up" = "copy_selection_on_prev_line"
"A-down" = "copy_selection_on_next_line"
"C-a" = "goto_line_start"
"C-e" = "goto_line_end"
"S-up" = "page_up"
"S-down" = "page_down"

[keys.normal.space]
"," = "global_search"
# lazygit を herdr ペインで下に開き zoom(全画面)する。呼び出し元 Helix の pane id を
# HELIX_PANE で渡し、lazygit 側の `o` (os.open) がそのペインへファイルを送り返せるようにする。
# split の JSON から新ペイン id を取り出して zoom --on する。
# agent start ではなく pane split を使う: agent start は「分割元ペイン」を指定できず
# フォーカス中のペインを割るため、別タブの Helix から呼ぶと無関係なタブに lazygit が出る。
# また agent 名が登録されるので lazygit を 2 つ開こうとすると agent_name_taken で失敗する。
# pane split は --pane で分割元を明示でき、agent 登録もしないので併用できる
# exec で起動する: シェルを置き換えるので lazygit を q で抜けたときペインごと閉じる
# lazygit は mise shim の絶対パスで起動する。素の `lazygit` だと mise upgrade 後に古い
# versioned パスが死んで /usr/local/bin の野良バイナリ等にフォールバックしうる。
# shim はバージョン非依存で常に最新を指す
# --cwd に現在バッファのディレクトリ(絶対パス)を渡す: 指定しないと編集中のリポジトリでは
# なくホームで開いてしまう
"space" = ''':sh d=$(cd "$(dirname "%{buffer_name}")" 2>/dev/null && pwd); id=$(herdr pane split --pane "$HERDR_PANE_ID" --direction down --cwd "$d" --env HELIX_PANE=$HERDR_PANE_ID --focus | grep -oE '"pane_id":"[^"]+"' | head -1 | cut -d'"' -f4); herdr pane run "$id" "exec $HOME/.local/share/mise/shims/lazygit" >/dev/null 2>&1; herdr pane zoom "$id" --on >/dev/null 2>&1'''
"s" = ":w"
"S" = "symbol_picker"
"r" = ":reset-diff-change"
"q" = ":q!"
"p" = "file_picker"
"f" = ":sh echo '%{buffer_name}' | tr -d '\\n' | (pbcopy 2>/dev/null || wl-copy 2>/dev/null || xclip -selection clipboard 2>/dev/null || clip.exe)"
"G" = "changed_file_picker"
"e" = "file_explorer_in_current_buffer_directory"
"E" = "file_explorer"
"g" = ":sh ghurl link '%{buffer_name}' '%{cursor_line}' | tr -d '\\n' | (pbcopy 2>/dev/null || wl-copy 2>/dev/null || xclip -selection clipboard 2>/dev/null || clip.exe)"
