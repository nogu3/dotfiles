theme = "rose_pine_moon_transparent"

[editor.file-picker]
hidden = false
git-ignore = false

[keys.normal]
"A-up" = "copy_selection_on_prev_line"
"A-down" = "copy_selection_on_next_line"
esc = ["collapse_selection", "keep_primary_selection"]
D = ["extend_to_line_end", "delete_selection"]
"C-a" = "goto_line_start"
"C-e" = "goto_line_end"
"S-up" = "page_up"
"S-down" = "page_down"

[keys.select]
"A-up" = "copy_selection_on_prev_line"
"A-down" = "copy_selection_on_next_line"
"C-a" = "goto_line_start"
"C-e" = "goto_line_end"
"S-up" = "page_up"
"S-down" = "page_down"

[keys.normal.space]
"," = "global_search"
"space" = ":sh pane=$(wezterm cli split-pane -- sh -c 'lazygit'); wezterm cli zoom-pane --pane-id \"$pane\""
"s" = ":w"
"S" = "symbol_picker"
"r" = ":reset-diff-change"
"q" = ":q!"
"p" = "file_picker"
"f" = "no_op"
"e" = "file_explorer_in_current_buffer_directory"
"E" = "file_explorer"
