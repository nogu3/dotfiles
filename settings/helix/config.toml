theme = "rose_pine_moon_transparent"

[editor.file-picker]
hidden = false
git-ignore = false

[keys.normal]
"A-up" = "copy_selection_on_prev_line"
"A-down" = "copy_selection_on_next_line"
esc = ["collapse_selection", "keep_primary_selection"]
D = ["extend_to_line_end", "delete_selection"]
"C-a" = "goto_line_start"
"C-e" = "goto_line_end"
"S-up" = "page_up"
"S-down" = "page_down"

[keys.select]
"A-up" = "copy_selection_on_prev_line"
"A-down" = "copy_selection_on_next_line"
"C-a" = "goto_line_start"
"C-e" = "goto_line_end"
"S-up" = "page_up"
"S-down" = "page_down"

[keys.normal.space]
"," = "global_search"
# lazygit を herdr ペインで下に開き zoom(全画面)する。呼び出し元 Helix の pane id を
# HELIX_PANE で渡し、lazygit 側の `o` (os.open) がそのペインへファイルを送り返せるようにする。
# agent start の JSON から新ペイン id を取り出して zoom --on する。
# lazygit は mise shim の絶対パスで起動する: agent start は herdr サーバーの環境
# スナップショットで解決するため、素の `lazygit` だと mise upgrade 後に古いパスが死んで
# /usr/local/bin の野良バイナリ等にフォールバックする。shim はバージョン非依存で常に最新を指す
# --cwd に現在バッファのディレクトリ(絶対パス)を渡す: agent start は cwd も herdr サーバーの
# スナップショット(=$HOME)で起動するため、指定しないと編集中のリポジトリではなくホームで開いてしまう
"space" = ''':sh d=$(cd "$(dirname "%{buffer_name}")" 2>/dev/null && pwd); id=$(herdr agent start lazygit --cwd "$d" --split down --focus --env HELIX_PANE=$HERDR_PANE_ID -- "$HOME/.local/share/mise/shims/lazygit" | grep -oE '"pane_id":"[^"]+"' | head -1 | cut -d'"' -f4); herdr pane zoom "$id" --on >/dev/null 2>&1'''
"s" = ":w"
"S" = "symbol_picker"
"r" = ":reset-diff-change"
"q" = ":q!"
"p" = "file_picker"
"f" = ":sh echo '%{buffer_name}' | tr -d '\\n' | (pbcopy 2>/dev/null || wl-copy 2>/dev/null || xclip -selection clipboard 2>/dev/null || clip.exe)"
"G" = "changed_file_picker"
"e" = "file_explorer_in_current_buffer_directory"
"E" = "file_explorer"
"g" = ":sh ghurl link '%{buffer_name}' '%{cursor_line}' | tr -d '\\n' | (pbcopy 2>/dev/null || wl-copy 2>/dev/null || xclip -selection clipboard 2>/dev/null || clip.exe)"
